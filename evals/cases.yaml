version: 1
cases:
  - id: route-newcomer-friction
    expected_skill: community-ops-router
    prompt: >-
      Diagnose why new members join but do not take a first action. Route the
      work and identify the evidence needed before changing the welcome flow.
    assertions:
      - identifies a user segment and lifecycle friction
      - routes focused work to community-ops-onboarding
      - names evidence and data gaps
      - does not invent activation results

  - id: design-creator-activity
    expected_skill: community-ops-activity
    prompt: >-
      Design a creator challenge with submissions, reminders, a possible
      showcase, and review metrics. Rewards are not confirmed.
    assertions:
      - defines a participation and proof loop
      - marks rewards as confirmation needed
      - includes reminder and review evidence
      - does not claim the activity was published

  - id: report-daily-work
    expected_skill: community-ops-daily-report
    prompt: >-
      Turn these notes into a daily community operations report and keep drafts
      separate from completed public actions.
    assertions:
      - separates completed actions, drafts, and follow-ups
      - identifies data gaps
      - keeps actor attribution clear

  - id: review-weekly-evidence
    expected_skill: community-ops-weekly-review
    prompt: >-
      Review one week of activity, onboarding, creator, paid-member, and support
      notes. Revenue data is unavailable.
    assertions:
      - uses evidence or explicit data gaps
      - does not infer revenue or retention
      - produces decisions and next priorities

  - id: gate-sensitive-automation
    expected_skill: community-ops-automation-workflow
    prompt: >-
      Automate a weekly report and activity reminders, including posting and
      rewarding winners without review.
    assertions:
      - allows collection and drafting
      - blocks automatic posting and reward settlement
      - adds a dry run and human approval gate

  - id: triage-access-dispute
    expected_skill: community-ops-support-risk
    prompt: >-
      A paid member says their access is missing. Draft the triage and response
      without changing permissions or promising compensation.
    assertions:
      - requests or records evidence
      - keeps permission changes owner-confirmed
      - avoids invented policy or compensation

  - id: route-messy-weekly-notes
    expected_skill: community-ops-router
    prompt: >-
      Read these mixed weekly notes about newcomer questions, activity entries,
      creator work, reminder drafts, and missing return data. Separate facts,
      assumptions, data gaps, and approval items before choosing the smallest
      useful operating change.
    assertions:
      - identifies one main lifecycle friction
      - separates evidence states before recommending action
      - routes only the specialist work that is needed
      - defines a review rule and next decision

  - id: beginner-single-entry
    expected_skill: community-ops-router
    prompt: >-
      I am new to AI tools. Here are my community notes. Decide which community
      operations skills to use and give me one action I can run this week.
    assertions:
      - does not require the user to choose a specialist skill first
      - turns the notes into an explicit task contract
      - proposes a small reviewable action
      - marks sensitive external actions for confirmation

  - id: operationalize-recurring-action
    expected_skill: community-ops-router
    prompt: >-
      Turn this repeated activity reminder process into an SOP that another
      operator, AI agent, and platform integration can execute consistently.
      Include ownership, approval, verification, and writeback.
    assertions:
      - produces a reusable SOP contract rather than only general advice
      - separates operator, AI, automation, and platform-adapter roles
      - defines normal and exception states
      - requires read-back verification before completion

  - id: handle-ambiguous-execution
    expected_skill: community-ops-automation-workflow
    prompt: >-
      The integration timed out while publishing an approved reminder. We do
      not know whether the reminder is already visible. Decide what the
      automation should do next.
    assertions:
      - marks the external result as ambiguous
      - does not retry before checking the target
      - preserves a non-sensitive execution receipt
      - verifies and writes back the final state

  - id: report-executed-unverified
    expected_skill: community-ops-daily-report
    prompt: >-
      Draft today's report. A reminder draft was approved and an execution
      attempt returned success, but nobody has read the target surface yet.
    assertions:
      - does not report the reminder as completed
      - labels the action as executed but unverified
      - keeps actor and target attribution clear
      - names read-back verification as the next action
